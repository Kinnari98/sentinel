name: Deploy Sentinel Analytic Rules

on:
  push:
    branches:
      - main
    paths:
      - 'analytic-rules/**' # Triggeröityy vain kun tässä kansiossa tapahtuu muutoksia

  workflow_dispatch: # Mahdollistaa myös manuaalisen ajon GitHubista

jobs:
  deploy:
    name: Deploy to Microsoft Sentinel
    runs-on: ubuntu-latest

    steps:
      # 1. Haetaan repon sisältö
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Kirjaudutaan Azureen Service Principalilla
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Asennetaan Python ja tarvittavat kirjastot
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      # 4. Deployataan kaikki YAML-säännöt Sentineliin
      - name: Deploy Analytic Rules
        env:
          WORKSPACE:      ${{ secrets.SENTINEL_WORKSPACE }}
          RESOURCE_GROUP: ${{ secrets.SENTINEL_RESOURCE_GROUP }}
        run: |
          python3 deploy_rules.py \
            --workspace "$WORKSPACE" \
            --resource-group "$RESOURCE_GROUP" \
            --rules-path "./analytic-rules"

      # 5. Kirjaudutaan ulos (turvallisuus)
      - name: Azure Logout
        if: always()
        run: az logout
